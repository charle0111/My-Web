<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>00981A 淨值與持股歷史趨勢</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  
  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
          appId: "1df85786-ebdb-4449-80dc-ed35cd6dce1d",
  
          serviceWorkerPath: "/My-Web/OneSignalSDKWorker.js",
          serviceWorkerParam: { scope: "/My-Web/" },
  
          notifyButton: {
              enable: true
          },
          promptOptions: {
              slidedown: {
                  enabled: true,
                  autoPrompt: true,
                  timeDelay: 3
              }
          }
      });
  });
  </script>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
    h1 { text-align: center; color: #1a202c; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .chart-wrapper { width: 100%; height: 500px; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>00981A 淨值與持股趨勢儀表板</h1>
    <p style="text-align: center; color: #666;">來自自動化的每日爬蟲更新資料，顯示淨值與成分股權重比例</p>
    <div class="chart-wrapper">
      <canvas id="myChart"></canvas>
    </div>
  </div>

  <script>
    Papa.parse("ezmoney_00981A_history.csv", {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        // Data is usually sorted by date in descending order. Ensure chronological for charting
        const data = results.data.sort((a,b) => new Date(a.date) - new Date(b.date));
        
        const labels = data.map(row => row.date);
        
        // Ensure values are parsed cleanly
        const navValues = data.map(row => {
            let val = row['每受益權單位淨資產價值(元)'];
            return val ? parseFloat(val) : null;
        });
        
        const totalIssued = data.map(row => {
            let val = row['已發行受益權單位總數'];
            return val ? (parseFloat(val) / 100000000) : null; // 轉換為「億」為單位
        });
        
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              {
                label: '每單位淨資產價值(元)',
                data: navValues,
                borderColor: '#4a90e2',
                backgroundColor: 'rgba(74, 144, 226, 0.1)',
                yAxisID: 'y',
                tension: 0.2,
                fill: true
              },
              {
                label: '發行單位總數 (億)',
                data: totalIssued,
                borderColor: '#2ecc71',
                backgroundColor: 'transparent',
                yAxisID: 'y2',
                borderDash: [5, 5],
                tension: 0.2
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: 'index',
              intersect: false,
            },
            scales: {
              x: {
                title: { display: true, text: '日期' }
              },
              y: {
                type: 'linear',
                display: true,
                position: 'left',
                title: { display: true, text: '每單位淨值 (元)' },
                suggestedMin: Math.min(...navValues.filter(n=>n!=null)) * 0.95
              },
              y2: {
                type: 'linear',
                display: true,
                position: 'right',
                title: { display: true, text: '單位總數 (億)' },
                grid: { drawOnChartArea: false }
              }
            }
          }
        });
      }
    });
  </script>
</body>
</html>
